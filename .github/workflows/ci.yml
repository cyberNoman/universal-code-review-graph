name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Unit tests (graph engine only — no MCP dependency) ──────────────────
  test-core:
    name: Test core (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install -r universal-code-graph/requirements-core.txt
          pip install pytest

      - name: Run unit tests
        run: |
          cd universal-code-graph
          PYTHONPATH=. python -m pytest tests/test_graph_core.py -v --tb=short

  # ── Smoke tests against real code ───────────────────────────────────────
  smoke:
    name: Smoke tests (language parsers)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install -r universal-code-graph/requirements-core.txt

      - name: Run smoke tests
        run: PYTHONPATH=universal-code-graph python universal-code-graph/tests/smoke_test.py

  # ── Lint — only real errors, no style bikeshedding ──────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint — syntax errors and undefined names only
        run: flake8 universal-code-graph/code_graph.py --select=E9,F63,F7,F82 --statistics
